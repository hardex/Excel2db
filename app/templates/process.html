{% extends "base.html" %}
{% block title %}Process File — Excel2DB{% endblock %}

{% block content %}
<h1>Process Excel File</h1>

<section class="form-section">
  <h2>Select File &amp; Template</h2>

  <form method="post" action="/process/start" enctype="multipart/form-data" id="processForm">
    <input type="hidden" id="selected_file_path" name="selected_file_path" value="" />
    <div class="form-row" style="flex-wrap: wrap;">
      <div class="form-group">
        <label for="file">Upload Excel File (.xlsx / .xlsm)</label>
        <input type="file" id="file" name="file" accept=".xlsx,.xlsm" />
      </div>
      <div class="form-group">
        <label for="template_select">Template</label>
        {% if all_templates %}
        <select id="template_select" name="template_code" onchange="syncVersion(this)">
          <option value="__auto__" data-version="" selected>Auto-detect from file</option>
          {% for tmpl in all_templates %}
          <option value="{{ tmpl.template_code }}"
                  data-version="{{ tmpl.template_version }}">
            {{ tmpl.template_code }} {{ tmpl.template_version }}
            {% if tmpl.is_default %}(default){% endif %}
          </option>
          {% endfor %}
        </select>
        <input type="hidden" id="template_version_hidden" name="template_version" value="" />
        {% else %}
        <p class="hint">No templates available. <a href="/templates/new">Create one first</a>.</p>
        {% endif %}
      </div>
      <div class="form-group">
        <label for="output_format">Output Format</label>
        <select id="output_format" name="output_format">
          <option value="json">JSON</option>
          <option value="csv" selected>CSV</option>
        </select>
      </div>
      {% if all_templates %}
      <div class="form-group" style="align-self: flex-end;">
        <button type="submit" class="btn btn--primary">Start Processing</button>
      </div>
      {% endif %}
    </div>

    <div style="margin-top: 1rem; border-top: 1px solid #e5e7eb; padding-top: 1rem;">
      <div class="form-row" style="flex-wrap: wrap; align-items: flex-end;">
        <div class="form-group" style="flex: 1; min-width: 300px;">
          <label>Or choose from folder</label>
          <div style="display: flex; gap: 0.5rem;">
            <button type="button" class="btn btn--secondary" onclick="browseFolder()">Browse...</button>
            <input type="file" id="folder_picker" webkitdirectory directory multiple style="display: none;" />
          </div>
        </div>
      </div>
      <div id="folder-files-wrap" style="display: none; margin-top: 0.5rem;">
        <label>Excel files <span id="folder-files-count" class="hint"></span></label>
        <select id="folder-files-list" size="2" style="width: 100%; font-family: monospace; overflow-y: auto; min-height: 66px;">
        </select>
      </div>
    </div>
  </form>
</section>

<script>
function syncVersion(select) {
  const opt = select.options[select.selectedIndex];
  document.getElementById('template_version_hidden').value = opt.dataset.version || '';
}

// Store File objects from browser folder picker, keyed by filename
let browserFiles = {};

// ── Resize the file list based on content and viewport ───────────────────────
function resizeFileList() {
  const list = document.getElementById('folder-files-list');
  const fileCount = list.options.length;
  if (fileCount === 0) return;

  const rowHeight = 22; // approximate px per option row
  const minHeight = 3 * rowHeight;
  const contentHeight = fileCount * rowHeight;

  // available space: from list top to bottom of viewport, with padding
  const listRect = list.getBoundingClientRect();
  const availableHeight = window.innerHeight - listRect.top - 40;

  list.style.height = Math.max(minHeight, Math.min(contentHeight, availableHeight)) + 'px';
}

// ── Browse folder via native dialog ──────────────────────────────────────────
function browseFolder() {
  document.getElementById('folder_picker').click();
}

document.getElementById('folder_picker').addEventListener('change', function() {
  const wrap = document.getElementById('folder-files-wrap');
  const list = document.getElementById('folder-files-list');
  const count = document.getElementById('folder-files-count');

  if (!this.files.length) return;

  // Filter Excel files (.xlsx/.xlsm) and store File objects
  browserFiles = {};
  const xlsxFiles = [];
  let folderName = '';

  for (const f of this.files) {
    // webkitRelativePath is like "FolderName/subfolder/file.xlsx"
    if (!folderName && f.webkitRelativePath) {
      folderName = f.webkitRelativePath.split('/')[0];
    }
    const n = f.name.toLowerCase();
    if (n.endsWith('.xlsx') || n.endsWith('.xlsm')) {
      xlsxFiles.push(f);
      browserFiles[f.name] = f;
    }
  }

  xlsxFiles.sort((a, b) => a.name.toLowerCase().localeCompare(b.name.toLowerCase()));

  count.textContent = '(' + xlsxFiles.length + ' found)';
  wrap.style.display = '';

  if (xlsxFiles.length === 0) {
    list.innerHTML = '<option disabled>No Excel files in this folder</option>';
    resizeFileList();
    return;
  }

  list.innerHTML = '';
  xlsxFiles.forEach(f => {
    const opt = document.createElement('option');
    opt.value = f.name;
    opt.textContent = f.name;
    list.appendChild(opt);
  });
  resizeFileList();
});

// ── File selection from list ─────────────────────────────────────────────────
document.getElementById('folder-files-list').addEventListener('change', function() {
  const selected = this.value;
  if (!selected) return;

  if (browserFiles[selected]) {
    const dt = new DataTransfer();
    dt.items.add(browserFiles[selected]);
    document.getElementById('file').files = dt.files;
    document.getElementById('selected_file_path').value = '';
  }
});

// When a file is uploaded directly, clear the folder selection
document.getElementById('file').addEventListener('change', function() {
  if (this.files.length) {
    document.getElementById('selected_file_path').value = '';
    const list = document.getElementById('folder-files-list');
    list.selectedIndex = -1;
  }
});

// Validate before submit: must have either upload or folder selection
document.getElementById('processForm').addEventListener('submit', function(e) {
  const hasUpload = document.getElementById('file').files.length > 0;
  const hasSelected = document.getElementById('selected_file_path').value.trim() !== '';
  if (!hasUpload && !hasSelected) {
    e.preventDefault();
    alert('Please upload a file or select one from the folder list.');
  }
});

// Recalculate list height on window resize
window.addEventListener('resize', function() {
  if (document.getElementById('folder-files-wrap').style.display !== 'none') {
    resizeFileList();
  }
});
</script>
{% endblock %}
